<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">foldermix Desktop app layout</title>
  <desc id="desc">A UI map of the foldermix Desktop window showing controls on the left and preview logs on the right.</desc>
  <rect width="1100" height="620" rx="24" fill="#f5f7fb"/>
  <rect x="36" y="34" width="1028" height="552" rx="18" fill="#ffffff" stroke="#c9d3e0" stroke-width="2"/>
  <rect x="36" y="34" width="1028" height="46" rx="18" fill="#e9eef5"/>
  <circle cx="66" cy="57" r="7" fill="#ff5f57"/>
  <circle cx="90" cy="57" r="7" fill="#ffbd2e"/>
  <circle cx="114" cy="57" r="7" fill="#28c840"/>
  <text x="550" y="63" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700" text-anchor="middle" fill="#1d2733">foldermix</text>

  <rect x="70" y="110" width="360" height="440" rx="14" fill="#fbfcfe" stroke="#d6dde7"/>
  <text x="96" y="148" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#17202b">Foldermix: Pack a Folder</text>
  <text x="96" y="178" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#526071">Choose a folder, preview files, then pack.</text>

  <rect x="96" y="214" width="144" height="38" rx="8" fill="#1f6feb"/>
  <text x="168" y="238" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">Select Folder</text>
  <rect x="96" y="270" width="304" height="34" rx="7" fill="#eef3f8" stroke="#cfd8e3"/>
  <text x="112" y="292" font-family="SFMono-Regular, Menlo, monospace" font-size="12" fill="#526071">/Users/me/project</text>

  <text x="96" y="335" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#17202b">Format</text>
  <rect x="168" y="314" width="94" height="34" rx="7" fill="#eef3f8" stroke="#cfd8e3"/>
  <text x="215" y="336" font-family="SFMono-Regular, Menlo, monospace" font-size="13" text-anchor="middle" fill="#17202b">md</text>

  <text x="96" y="385" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#17202b">Extensions</text>
  <rect x="96" y="402" width="304" height="82" rx="8" fill="#ffffff" stroke="#cfd8e3"/>
  <text x="116" y="431" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#17202b">[x] .py (18)</text>
  <text x="116" y="459" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#17202b">[x] .md (6)</text>

  <rect x="96" y="506" width="108" height="36" rx="8" fill="#1f6feb"/>
  <text x="150" y="529" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">Preview</text>
  <rect x="216" y="506" width="90" height="36" rx="8" fill="#2da44e"/>
  <text x="261" y="529" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">Run</text>

  <rect x="468" y="110" width="562" height="440" rx="14" fill="#101820" stroke="#263342"/>
  <text x="749" y="144" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#e6edf3">Preview and Logs</text>
  <text x="500" y="190" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#5eead4">$ foldermix list /Users/me/project</text>
  <text x="500" y="228" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#dbe7f3">Included files</text>
  <text x="500" y="260" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#9fb0c3">src/app.py</text>
  <text x="500" y="292" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#9fb0c3">README.md</text>
  <text x="500" y="340" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#5eead4">$ foldermix pack ... --out context.md</text>
  <text x="500" y="378" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#86efac">Pack complete: context.md</text>
</svg>
