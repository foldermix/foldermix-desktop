name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version number to release (e.g. 1.2.3 — no leading v)"
        required: true

jobs:
  build-dmg:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow (icon generation)
        run: pip install pillow

      - name: Build DMG
        run: ./scripts/build_dmg.sh "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            "build/foldermix-v${{ steps.version.outputs.version }}.dmg" \
            --generate-notes \
            --title "foldermix desktop v${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
