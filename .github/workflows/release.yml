name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version number to release (e.g. 1.2.3 — no leading v)"
        required: true

jobs:
  build-dmg:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow (icon generation)
        run: pip install pillow

      - name: Build DMG (standard — no OCR)
        run: ./scripts/build_dmg.sh "${{ steps.version.outputs.version }}"

      - name: Build DMG (full — with OCR)
        run: ./scripts/build_dmg.sh "${{ steps.version.outputs.version }}" --full

      - name: Create GitHub Release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Versioned names for the release page
          # Fixed names for stable download URLs (latest/download/<name>)
          cp "build/foldermix-v${VERSION}.dmg"       "build/foldermix-desktop.dmg"
          cp "build/foldermix-v${VERSION}-full.dmg"  "build/foldermix-desktop-full.dmg"
          gh release create "v${VERSION}" \
            "build/foldermix-v${VERSION}.dmg" \
            "build/foldermix-v${VERSION}-full.dmg" \
            "build/foldermix-desktop.dmg" \
            "build/foldermix-desktop-full.dmg" \
            --generate-notes \
            --title "foldermix desktop v${VERSION}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
